<!DOCTYPE html>
<html>

<head>
    <title>Nightfall OS</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>

<body
    style="margin: 0; padding: 0; background-image: url('wallpaperflare.com_wallpaper.jpg'); background-size: cover; background-position: center; height: 100vh; font-family: 'VT323', monospace; overflow: hidden; color: #d4c5e3;">

    <div
        style="position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; background-color: rgba(15, 10, 25, 0.9); border-bottom: 2px solid #ff9d00; padding: 8px 0; z-index: 100; font-size: 22px;">

        <div style="margin-left: 20px; color: #ff9d00; text-shadow: 2px 2px 0px #000;">
            Nightfall_OS
        </div>

        <div id="timeElement" style="margin-right: 20px; text-shadow: 2px 2px 0px #000;">
            --:--
        </div>
    </div>

    <div
        style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; background-color: rgba(20, 12, 30, 0.85); border: 2px solid #ff9d00; padding: 30px; text-align: center; box-shadow: 8px 8px 0px rgba(0,0,0,0.8);">

        <h1 style="color: #ff9d00; font-size: 36px; margin-top: 0; text-shadow: 2px 2px 0px #000;">SYSTEM BOOT</h1>

        <p style="font-size: 24px; margin-bottom: 30px;">Welcome to the sanctuary.</p>

        <img src="https://api.dicebear.com/9.x/pixel-art/svg?seed=Nightfall"
            style="width: 100px; border: 2px solid #ff9d00; background-color: #0f0a19; margin-bottom: 30px; box-shadow: 4px 4px 0px rgba(0,0,0,0.8);" alt="Avatar">

        <br>

        <button
            style="background-color: #ff9d00; color: #0f0a19; font-family: 'VT323', monospace; font-size: 24px; padding: 10px 25px; border: 2px solid #0f0a19; cursor: pointer; box-shadow: 4px 4px 0px #000; transition: 0.2s;">
            ENTER SYSTEM
        </button>
    </div>

    <script>
        function updateTime() {
            var currentTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.querySelector("#timeElement").innerHTML = currentTime;
        }

        setInterval(updateTime, 1000);
        updateTime(); 
    </script>
</body>

</html>
