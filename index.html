<!DOCTYPE html>
<html>

<head>
    <title>Premium Web OS</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="top-bar">
        <div id="openBtn" class="menu-item">
             Limux
        </div>

        <div id="timeElement" style="margin-right: 20px;">
            Loading...
        </div>
    </div>

    <div id="widget" class="window">

        <div id="widgetheader" class="window-header">
            <div class="window-controls">
                <button id="closeBtn" class="control-btn btn-close"></button>
                <button class="control-btn btn-min"></button>
                <button class="control-btn btn-max"></button>
            </div>
            <div class="window-title">System Properties</div>
        </div>

        <div class="window-content">
            <h2 style="margin-top: 0; font-weight: 500;">Boundary Active</h2>
            <p style="color: rgba(255,255,255,0.7); line-height: 1.5;">
                Try dragging this window to the top of the screen. It will now stop perfectly beneath the top bar.
            </p>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
