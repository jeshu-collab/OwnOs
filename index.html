<!DOCTYPE html>
<html>

<head>
    <title>Premium Web OS</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="top-bar">
        <div id="openBtn" class="menu-item">
             Limux
        </div>

        <div id="timeElement" style="margin-right: 20px;">
            Loading...
        </div>
    </div>

    <div id="widget" class="window">

        <div id="widgetheader" class="window-header">
            <div class="window-controls">
                <button id="closeBtn" class="control-btn btn-close"></button>
                <button class="control-btn btn-min"></button>
                <button class="control-btn btn-max"></button>
            </div>
            <div class="window-title">System Properties</div>
        </div>

        <div class="window-content">
            <h2 style="margin-top: 0; font-weight: 500;">Boundary Active</h2>
            <p style="color: rgba(255,255,255,0.7); line-height: 1.5;">
                Try dragging this window to the top of the screen. It will now stop perfectly beneath the top bar.
            </p>
        </div>
    </div>

    <nav class="mac-dock">
        <div class="dock-container">
            <button class="dock-item" onclick="toggleApp('browser-app')">
                <img src="https://api.iconify.design/logos:safari.svg" alt="Browser">
                <span class="dock-tooltip">Browser</span>
            </button>

            <button class="dock-item" onclick="toggleApp('notes-app')">
                <img src="https://api.iconify.design/fxemoji:note.svg" alt="Notes">
                <span class="dock-tooltip">Notes</span>
            </button>

            <button class="dock-item" onclick="toggleApp('music-app')">
                <img src="https://api.iconify.design/logos:apple-music.svg" alt="Music">
                <span class="dock-tooltip">Music</span>
            </button>

            <button class="dock-item" onclick="toggleApp('calc-app')">
                <img src="https://api.iconify.design/flat-color-icons:calculator.svg" alt="Calculator">
                <span class="dock-tooltip">Calculator</span>
            </button>

            <button class="dock-item" onclick="toggleApp('terminal-app')">
                <img src="https://api.iconify.design/flat-color-icons:command-line.svg" alt="Terminal">
                <span class="dock-tooltip">Terminal</span>
            </button>
        </div>
    </nav>

    <script src="./script.js"></script>
</body>

</html>
